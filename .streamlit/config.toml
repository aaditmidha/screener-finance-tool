# Streamlit app configuration (safe to commit — no secrets here).
[server]
headless = true

[browser]
gatherUsageStats = false

# Base theme matches the default (light) mode so native widgets (dataframes,
# dropdowns) render correctly out of the box. The in-app 🌙 toggle overlays a
# dark theme via CSS; see screener/ui/app.py:_inject_theme.
[theme]
base = "light"
primaryColor = "#2f6bff"
backgroundColor = "#eef2f8"
secondaryBackgroundColor = "#ffffff"
textColor = "#1e293b"
font = "sans serif"
